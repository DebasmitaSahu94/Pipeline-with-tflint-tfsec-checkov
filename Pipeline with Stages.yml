trigger:
  branches:
    include:
    - none
pool:
  name: TerraformPool
stages:
- stage: ''
  displayName: Terraform Tool Installation
  jobs:
  - job: InstallTerraform
    displayName: Install Terraform Tool
    steps:
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: latest
- stage: ''
  displayName: Validation and Security scans
  jobs:
  - job: TerraformValidation
    displayName: Terraform Validation and Security Checks
    steps:
    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: latest
    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        backendServiceArm: mySVC
        backendAzureRmResourceGroupName: myRG
        backendAzureRmStorageAccountName: mysacct
        backendAzureRmContainerName: backendcontainer
        backendAzureRmKey: dev.tfstate
    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
    - task: PowerShell@2
      displayName: Install TFLint
      inputs:
        targetType: inline
        script: |
          $version = "0.53.0"
          $url = "https://github.com/terraform-linters/tflint/releases/download/v$version/tflint_windows_amd64.zip"

          $zip = "$(Agent.TempDirectory)\tflint.zip"
          $dir = "$(Agent.TempDirectory)\tflint"

          Invoke-WebRequest -Uri $url -OutFile $zip

          Expand-Archive -Path $zip -DestinationPath $dir -Force

          Write-Host "Contents of $dir"
          Get-ChildItem -Path $dir -Recurse

          Write-Host "##vso[task.prependpath]$dir"

          & "$dir\tflint.exe" --version
    - task: PowerShell@2
      displayName: Initialize TFLint
      inputs:
        targetType: inline
        script: |
          tflint --init
    - task: PowerShell@2
      displayName: Run TFLint
      inputs:
        targetType: inline
        script: |
          tflint --recursive
    - task: PowerShell@2
      displayName: Install Checkov
      inputs:
        targetType: inline
        script: |
          $url = "https://github.com/bridgecrewio/checkov/releases/latest/download/checkov_windows_x86_64.zip"

          $zip = "$(Agent.TempDirectory)\checkov.zip"
          $dir = "$(Agent.TempDirectory)\checkov"

          Invoke-WebRequest -Uri $url -OutFile $zip

          Expand-Archive -Path $zip -DestinationPath $dir -Force

          Write-Host "Extracted files:"
          Get-ChildItem -Path $dir -Recurse

          # Find checkov.exe safely
          $exe = Get-ChildItem -Path $dir -Recurse -Filter "checkov.exe" | Select-Object -First 1

          if (-not $exe) {
              throw "checkov.exe NOT FOUND after extraction"
          }

          Write-Host "Found Checkov at: $($exe.FullName)"

          # Store folder in PATH for next task
          Write-Host "##vso[task.prependpath]$($exe.DirectoryName)"
    - task: PowerShell@2
      displayName: Run Checkov
      inputs:
        targetType: inline
        script: |
          Write-Host "PATH is: $env:PATH"

          # Try direct execution first
          $exe = Get-ChildItem "$(Agent.TempDirectory)\checkov" -Recurse -Filter "checkov.exe" | Select-Object -First 1

          if (-not $exe) {
              throw "checkov.exe not found"
          }

          & $exe.FullName -d .
    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        environmentServiceNameAzureRM: mySVC
    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: azurerm
        command: apply
        commandOptions: '--auto-approve'
        environmentServiceNameAzureRM: mySVC

